name: Generate lockfiles

on:
  pull_request:

permissions:
  contents: write

concurrency:
  group: lockfiles-${{ github.ref }}
  cancel-in-progress: false

jobs:
  lock:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/portfolio-foundation
      - uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
      - run: corepack enable
      - run: pnpm install --lockfile-only --no-frozen-lockfile
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v6
      - run: uv lock
        working-directory: apps/worker
      - name: Commit generated locks
        run: |
          git add pnpm-lock.yaml apps/worker/uv.lock
          if git diff --cached --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(deps): lock generated dependencies"
          git push origin HEAD:agent/portfolio-foundation
