name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
      - run: corepack enable
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: pnpm smoke

  worker:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --all-groups
      - run: uv run ruff check .
      - run: uv run pytest --cov=portfolio_worker --cov-report=term-missing

  database:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: portfolio
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d portfolio"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGURL: postgresql://postgres:postgres@localhost:5432/portfolio
    steps:
      - uses: actions/checkout@v4
      - name: Apply migrations
        run: |
          for migration in migrations/*.sql; do
            psql "$PGURL" -v ON_ERROR_STOP=1 -f "$migration"
          done
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Run repository integration test
        working-directory: apps/worker
        run: |
          uv sync --all-groups
          uv run pytest tests/test_repository_integration.py
      - name: Verify read role can use safe views
        run: |
          psql "$PGURL" -v ON_ERROR_STOP=1 \
            -c "SET ROLE portfolio_app; SELECT count(*) FROM app_transaction;"
      - name: Verify read role cannot access encrypted secrets
        run: |
          if psql "$PGURL" -v ON_ERROR_STOP=1 \
            -c "SET ROLE portfolio_app; SELECT count(*) FROM encrypted_secret;"; then
            echo "portfolio_app unexpectedly read encrypted_secret"
            exit 1
          fi
      - name: Verify worker role can write
        run: |
          psql "$PGURL" -v ON_ERROR_STOP=1 \
            -c "SET ROLE portfolio_worker; UPDATE connector_state SET checkpoint = '{\"ci\": true}'::jsonb WHERE connector = 'CNB_FX';"
